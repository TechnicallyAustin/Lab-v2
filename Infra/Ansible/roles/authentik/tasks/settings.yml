---
- name: Get current settings
  ansible.builtin.uri:
    url: "{{ authentik_api_url }}/api/v3/admin/settings/"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_token }}"
    validate_certs: "{{ authentik_api_validate_certs }}"
    status_code: [200]
    timeout: "{{ authentik_api_call_timeout }}"
  register: authentik_existing_settings
  retries: "{{ authentik_api_call_retries }}"
  delay: "{{ authentik_api_call_delay }}"

- name: Update settings
  ansible.builtin.uri:
    url: "{{ authentik_api_url }}/api/v3/admin/settings/"
    method: PUT
    headers:
      Authorization: "Bearer {{ authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ _authentik_config.settings }}"
    validate_certs: "{{ authentik_api_validate_certs }}"
    status_code: [200]
    timeout: "{{ authentik_api_call_timeout }}"
  register: authentik_custom_settings
  changed_when: >-
    authentik_custom_settings.json != authentik_existing_settings.json
  retries: "{{ authentik_api_call_retries }}"
  delay: "{{ authentik_api_call_delay }}"
